<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 458" font-family="ui-sans-serif, system-ui, sans-serif">
<defs>
  <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
  </marker>
  <marker id="arrg" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
  </marker>
</defs>

<!-- Background -->
<rect width="900" height="458" fill="#f8fafc" rx="12"/>

<!-- ── QUERY FLOW LABEL ── -->
<text x="28" y="32" font-size="10" font-weight="700" fill="#94a3b8" letter-spacing="2">QUERY FLOW</text>

<!-- ── ROW 1: Input chain + Agent ── -->

<!-- User -->
<rect x="28" y="50" width="90" height="44" rx="8" fill="#475569"/>
<text x="73" y="69" font-size="11" font-weight="600" fill="white" text-anchor="middle">User Query</text>
<text x="73" y="84" font-size="9" fill="#cbd5e1" text-anchor="middle">question</text>

<line x1="118" y1="72" x2="146" y2="72" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- Next.js Frontend -->
<rect x="148" y="50" width="118" height="44" rx="8" fill="#0891b2"/>
<text x="207" y="69" font-size="11" font-weight="600" fill="white" text-anchor="middle">Next.js</text>
<text x="207" y="84" font-size="9" fill="#cffafe" text-anchor="middle">Frontend</text>

<line x1="266" y1="72" x2="294" y2="72" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- Flask API -->
<rect x="296" y="50" width="118" height="44" rx="8" fill="#0284c7"/>
<text x="355" y="69" font-size="11" font-weight="600" fill="white" text-anchor="middle">Flask API</text>
<text x="355" y="84" font-size="9" fill="#bae6fd" text-anchor="middle">SSE Streaming</text>

<line x1="414" y1="72" x2="448" y2="72" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- ReAct Agent (prominent) -->
<rect x="450" y="38" width="190" height="76" rx="10" fill="#0f172a"/>
<text x="545" y="63" font-size="13" font-weight="700" fill="white" text-anchor="middle">ReAct Agent Loop</text>
<text x="545" y="80" font-size="10" fill="#64748b" text-anchor="middle">Reason · Act · Observe</text>
<rect x="500" y="88" width="90" height="18" rx="9" fill="#4f46e5"/>
<text x="545" y="101" font-size="9" font-weight="600" fill="white" text-anchor="middle">Gemini LLM</text>

<!-- ── Fanout: Agent → Tools ── -->
<!-- Vertical stem from agent bottom -->
<line x1="545" y1="114" x2="545" y2="154" stroke="#94a3b8" stroke-width="1.5"/>
<!-- Horizontal bus -->
<line x1="503" y1="154" x2="742" y2="154" stroke="#94a3b8" stroke-width="1.5"/>
<!-- Verticals down to tool tops -->
<line x1="503" y1="154" x2="503" y2="180" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="622" y1="154" x2="622" y2="180" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="742" y1="154" x2="742" y2="180" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- Tool 1: Semantic Vector Search -->
<rect x="448" y="182" width="110" height="46" rx="8" fill="#7c3aed"/>
<text x="503" y="202" font-size="11" font-weight="600" fill="white" text-anchor="middle">Semantic</text>
<text x="503" y="218" font-size="9" fill="#ede9fe" text-anchor="middle">Vector Search</text>

<!-- Tool 2: BM25 -->
<rect x="566" y="182" width="112" height="46" rx="8" fill="#7c3aed"/>
<text x="622" y="202" font-size="11" font-weight="600" fill="white" text-anchor="middle">BM25 Keyword</text>
<text x="622" y="218" font-size="9" fill="#ede9fe" text-anchor="middle">Full-text Search</text>

<!-- Tool 3: Entity Lookup -->
<rect x="686" y="182" width="112" height="46" rx="8" fill="#7c3aed"/>
<text x="742" y="202" font-size="11" font-weight="600" fill="white" text-anchor="middle">Entity Lookup</text>
<text x="742" y="218" font-size="9" fill="#ede9fe" text-anchor="middle">Character Index</text>

<!-- ── Fan-in: Tools → MongoDB ── -->
<line x1="503" y1="228" x2="503" y2="254" stroke="#94a3b8" stroke-width="1.5"/>
<line x1="622" y1="228" x2="622" y2="254" stroke="#94a3b8" stroke-width="1.5"/>
<line x1="742" y1="228" x2="742" y2="254" stroke="#94a3b8" stroke-width="1.5"/>
<line x1="503" y1="254" x2="742" y2="254" stroke="#94a3b8" stroke-width="1.5"/>
<line x1="622" y1="254" x2="622" y2="270" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- RRF label -->
<text x="750" y="245" font-size="9" fill="#94a3b8" font-style="italic">RRF Fusion</text>

<!-- MongoDB Atlas (query store) -->
<rect x="448" y="272" width="348" height="54" rx="10" fill="#059669"/>
<text x="622" y="296" font-size="13" font-weight="700" fill="white" text-anchor="middle">MongoDB Atlas</text>
<text x="622" y="313" font-size="10" fill="#a7f3d0" text-anchor="middle">Vector Index · BM25 Index · Metadata Store</text>

<!-- Results dashed curve: MongoDB right → Agent right -->
<path d="M 796,299 C 848,299 848,72 640,72" stroke="#34d399" stroke-width="1.5" fill="none" stroke-dasharray="5,4" marker-end="url(#arrg)"/>
<text x="856" y="198" font-size="9" fill="#34d399" text-anchor="middle" transform="rotate(90,856,198)">results</text>

<!-- ── DIVIDER ── -->
<line x1="24" y1="354" x2="876" y2="354" stroke="#e2e8f0" stroke-width="1.5"/>
<text x="28" y="372" font-size="10" font-weight="700" fill="#94a3b8" letter-spacing="2">INGESTION PIPELINE</text>

<!-- ── Ingestion Row ── -->

<!-- PDF / Text -->
<rect x="28" y="384" width="96" height="44" rx="8" fill="#475569"/>
<text x="76" y="403" font-size="11" font-weight="600" fill="white" text-anchor="middle">PDF / Text</text>
<text x="76" y="418" font-size="9" fill="#cbd5e1" text-anchor="middle">document</text>

<line x1="124" y1="406" x2="152" y2="406" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- Ingestion Pipeline -->
<rect x="154" y="384" width="152" height="44" rx="8" fill="#0284c7"/>
<text x="230" y="403" font-size="11" font-weight="600" fill="white" text-anchor="middle">Ingestion Pipeline</text>
<text x="230" y="418" font-size="9" fill="#bae6fd" text-anchor="middle">Chunk · Resume · Rate Limit</text>

<line x1="306" y1="406" x2="334" y2="406" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- Gemini (embed + metadata) -->
<rect x="336" y="384" width="152" height="44" rx="8" fill="#4f46e5"/>
<text x="412" y="403" font-size="11" font-weight="600" fill="white" text-anchor="middle">Gemini</text>
<text x="412" y="418" font-size="9" fill="#e0e7ff" text-anchor="middle">Embeddings · Metadata</text>

<line x1="488" y1="406" x2="516" y2="406" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- MongoDB Atlas (ingestion target) -->
<rect x="518" y="384" width="200" height="44" rx="8" fill="#059669"/>
<text x="618" y="403" font-size="12" font-weight="700" fill="white" text-anchor="middle">MongoDB Atlas</text>
<text x="618" y="418" font-size="9" fill="#a7f3d0" text-anchor="middle">Chunks + Vectors + Metadata</text>

</svg>