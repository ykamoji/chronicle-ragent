name: Chronicle Health Trigger

on:
  schedule:
    - cron: '*/5 * * * *' # Runs every 5 minutes to prevent Render from sleeping
  workflow_dispatch:      # Allows manual triggering from the Actions tab

jobs:
  ping:
    name: Ping Health Endpoint
    runs-on: ubuntu-latest
    steps:
      - name: GET MCP Health Check
        run: |
          curl -f --retry 5 --retry-delay 10 --max-time 60 "https://chronicle-mcp.onrender.com/health"

      - name: Wait 1 minute
        run: sleep 60

      - name: GET Ragent Health Check
        run: |
          curl -f --retry 5 --retry-delay 10 --max-time 60 "https://chronicle-ragent.onrender.com"