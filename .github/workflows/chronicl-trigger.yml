name: Chronicle Health Trigger

on:
  schedule:
    # Using specific minutes to avoid "top of the hour" traffic
    - cron: '3,13,23,33,43,53 * * * *'
  # Allows manual triggering from the Actions tab
  workflow_dispatch:

jobs:
  ping:
    name: Ping Health Endpoint
    runs-on: ubuntu-latest
    steps:
      - name: GET Health Check
        run: |
          curl -f --retry 3 --max-time 60 "https://chronicle-mcp.onrender.com/health"
          curl -f --retry 3 --max-time 60 "https://chronicle-ragent.onrender.com"