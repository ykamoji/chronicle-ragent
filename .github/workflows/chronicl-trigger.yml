name: Chronicle Health Trigger

on:
  schedule:
    # Only run once per hour using a lock or timestamp
    - cron: '37 * * * *'
  # Allows manual triggering from the Actions tab
  workflow_dispatch:

jobs:
  ping:
    name: Ping Health Endpoint
    runs-on: ubuntu-latest
    steps:
      - name: GET Health Check
        run: |
          curl -f --retry 3 --max-time 60 \
          -H "X-Trigger-Source: github-actions" \
          -H "User-Agent: Chronicle-HealthCheck/GitHubActions" \
          "https://chronicle-mcp.onrender.com/health"
          curl -f --retry 3 --max-time 60 "https://chronicle-ragent.onrender.com"